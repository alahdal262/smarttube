<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="400" viewBox="0 0 1200 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d4f4f"/>
      <stop offset="50%" style="stop-color:#14706e"/>
      <stop offset="100%" style="stop-color:#1a8a87"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f5a623"/>
      <stop offset="100%" style="stop-color:#e8930c"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="100" cy="350" r="200" fill="rgba(255,255,255,0.03)"/>
  <circle cx="1100" cy="50" r="250" fill="rgba(255,255,255,0.03)"/>
  <circle cx="600" cy="200" r="300" fill="rgba(255,255,255,0.02)"/>

  <!-- Grid pattern -->
  <g opacity="0.05">
    <line x1="0" y1="100" x2="1200" y2="100" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="200" x2="1200" y2="200" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="300" x2="1200" y2="300" stroke="#fff" stroke-width="1"/>
    <line x1="300" y1="0" x2="300" y2="400" stroke="#fff" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="400" stroke="#fff" stroke-width="1"/>
    <line x1="900" y1="0" x2="900" y2="400" stroke="#fff" stroke-width="1"/>
  </g>

  <!-- Play button icon -->
  <g transform="translate(120, 120)" filter="url(#shadow)">
    <rect x="0" y="0" width="160" height="160" rx="24" fill="rgba(0,0,0,0.3)"/>
    <rect x="4" y="4" width="152" height="152" rx="20" fill="none" stroke="url(#accent)" stroke-width="3"/>
    <!-- YouTube play triangle -->
    <path d="M55 45 L55 115 L120 80 Z" fill="#f5a623"/>
    <!-- Small grid dots -->
    <circle cx="30" cy="30" r="4" fill="rgba(245,166,35,0.4)"/>
    <circle cx="50" cy="30" r="4" fill="rgba(245,166,35,0.4)"/>
    <circle cx="130" cy="30" r="4" fill="rgba(245,166,35,0.4)"/>
    <circle cx="130" cy="130" r="4" fill="rgba(245,166,35,0.4)"/>
  </g>

  <!-- Title -->
  <text x="340" y="170" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="800" fill="#ffffff" letter-spacing="-1">
    SmartTube
  </text>

  <!-- Subtitle -->
  <text x="340" y="220" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="400" fill="rgba(255,255,255,0.7)">
    YouTube Playlist Gallery for WordPress
  </text>

  <!-- Feature pills -->
  <g transform="translate(340, 250)">
    <rect x="0" y="0" width="110" height="32" rx="16" fill="rgba(245,166,35,0.2)" stroke="#f5a623" stroke-width="1.5"/>
    <text x="55" y="21" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#f5a623" text-anchor="middle">Lightbox</text>

    <rect x="125" y="0" width="80" height="32" rx="16" fill="rgba(245,166,35,0.2)" stroke="#f5a623" stroke-width="1.5"/>
    <text x="165" y="21" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#f5a623" text-anchor="middle">PiP</text>

    <rect x="220" y="0" width="90" height="32" rx="16" fill="rgba(245,166,35,0.2)" stroke="#f5a623" stroke-width="1.5"/>
    <text x="265" y="21" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#f5a623" text-anchor="middle">Tabs</text>

    <rect x="325" y="0" width="120" height="32" rx="16" fill="rgba(245,166,35,0.2)" stroke="#f5a623" stroke-width="1.5"/>
    <text x="385" y="21" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#f5a623" text-anchor="middle">Categories</text>

    <rect x="460" y="0" width="80" height="32" rx="16" fill="rgba(245,166,35,0.2)" stroke="#f5a623" stroke-width="1.5"/>
    <text x="500" y="21" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#f5a623" text-anchor="middle">RTL</text>
  </g>

  <!-- Version badge -->
  <g transform="translate(340, 305)">
    <rect x="0" y="0" width="55" height="24" rx="4" fill="#555"/>
    <text x="27" y="16" font-family="monospace" font-size="11" fill="#fff" text-anchor="middle">v1.3.1</text>
    <rect x="55" y="0" width="50" height="24" rx="4" fill="#4c1" x="55"/>
    <text x="80" y="16" font-family="monospace" font-size="11" fill="#fff" text-anchor="middle">stable</text>
  </g>

  <!-- Bottom accent bar -->
  <rect x="0" y="390" width="1200" height="10" fill="url(#accent)"/>
</svg>
