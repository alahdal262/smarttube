<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#f0f0f1" rx="12"/>

  <!-- WP Admin sidebar -->
  <rect x="0" y="0" width="180" height="500" fill="#1d2327" rx="12 0 0 12"/>
  <text x="20" y="35" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#fff">WordPress Admin</text>

  <!-- Menu items -->
  <g font-family="system-ui, sans-serif" font-size="13" fill="rgba(255,255,255,0.7)">
    <rect x="0" y="55" width="180" height="36" fill="rgba(255,255,255,0.05)"/>
    <text x="42" y="78">Dashboard</text>
    <text x="20" y="78" font-size="16">&#9633;</text>

    <rect x="0" y="91" width="180" height="36" fill="rgba(255,255,255,0.05)"/>
    <text x="42" y="114">Posts</text>
    <text x="20" y="114" font-size="16">&#9998;</text>
  </g>

  <!-- SmartTube menu active -->
  <rect x="0" y="127" width="180" height="36" fill="#2271b1"/>
  <text x="42" y="150" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#fff">SmartTube</text>
  <text x="20" y="150" font-family="system-ui" font-size="16" fill="#fff">&#9654;</text>

  <!-- Cleanup menu -->
  <rect x="0" y="163" width="180" height="36" fill="rgba(255,255,255,0.05)"/>
  <text x="42" y="186" font-family="system-ui, sans-serif" font-size="13" fill="rgba(255,255,255,0.7)">Post Cleanup</text>
  <text x="20" y="186" font-family="system-ui" font-size="16" fill="rgba(255,255,255,0.5)">&#128465;</text>

  <!-- Main content area -->
  <g transform="translate(200, 20)">
    <text x="0" y="20" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="#1d2327">SmartTube — Playlist Manager</text>

    <!-- Stats row -->
    <g transform="translate(0, 40)">
      <rect x="0" y="0" width="120" height="50" rx="6" fill="#e8f5e9" stroke="#a5d6a7" stroke-width="1"/>
      <text x="10" y="22" font-family="system-ui" font-size="11" fill="#2e7d32">Linked</text>
      <text x="10" y="40" font-family="system-ui" font-size="18" font-weight="700" fill="#2e7d32">64</text>

      <rect x="135" y="0" width="120" height="50" rx="6" fill="#e3f2fd" stroke="#90caf9" stroke-width="1"/>
      <text x="145" y="22" font-family="system-ui" font-size="11" fill="#1565c0">Showing Videos</text>
      <text x="145" y="40" font-family="system-ui" font-size="18" font-weight="700" fill="#1565c0">58</text>

      <rect x="270" y="0" width="120" height="50" rx="6" fill="#fff8e1" stroke="#ffe082" stroke-width="1"/>
      <text x="280" y="22" font-family="system-ui" font-size="11" fill="#f57f17">Excluded</text>
      <text x="280" y="40" font-family="system-ui" font-size="18" font-weight="700" fill="#f57f17">12</text>

      <rect x="405" y="0" width="120" height="50" rx="6" fill="#fce4ec" stroke="#ef9a9a" stroke-width="1"/>
      <text x="415" y="22" font-family="system-ui" font-size="11" fill="#c62828">Unlinked</text>
      <text x="415" y="40" font-family="system-ui" font-size="18" font-weight="700" fill="#c62828">6</text>
    </g>

    <!-- Table mockup -->
    <g transform="translate(0, 110)">
      <!-- Filter tabs -->
      <rect x="0" y="0" width="60" height="28" rx="4" fill="#2271b1"/>
      <text x="30" y="19" font-family="system-ui" font-size="11" fill="#fff" text-anchor="middle">All</text>
      <rect x="66" y="0" width="80" height="28" rx="4" fill="#f0f0f1" stroke="#c3c4c7" stroke-width="1"/>
      <text x="106" y="19" font-family="system-ui" font-size="11" fill="#646970" text-anchor="middle">Linked</text>
      <rect x="152" y="0" width="90" height="28" rx="4" fill="#f0f0f1" stroke="#c3c4c7" stroke-width="1"/>
      <text x="197" y="19" font-family="system-ui" font-size="11" fill="#646970" text-anchor="middle">Unlinked</text>

      <!-- Table -->
      <rect x="0" y="40" width="570" height="30" fill="#fff" stroke="#dcdcde" stroke-width="1"/>
      <text x="10" y="60" font-family="system-ui" font-size="11" font-weight="600" fill="#1d2327">Img</text>
      <text x="50" y="60" font-family="system-ui" font-size="11" font-weight="600" fill="#1d2327">Playlist</text>
      <text x="240" y="60" font-family="system-ui" font-size="11" font-weight="600" fill="#1d2327">Category</text>
      <text x="400" y="60" font-family="system-ui" font-size="11" font-weight="600" fill="#1d2327">Limit</text>
      <text x="450" y="60" font-family="system-ui" font-size="11" font-weight="600" fill="#1d2327">Display</text>

      <!-- Row 1 -->
      <rect x="0" y="70" width="570" height="35" fill="#f9f9f9" stroke="#dcdcde" stroke-width="0.5"/>
      <rect x="10" y="76" width="28" height="22" rx="3" fill="#ddd"/>
      <text x="50" y="92" font-family="system-ui" font-size="12" font-weight="600" fill="#1d2327">Yemen News</text>
      <rect x="240" y="76" width="140" height="22" rx="3" fill="#fff" stroke="#c3c4c7" stroke-width="1"/>
      <text x="250" y="92" font-family="system-ui" font-size="10" fill="#333">News Category</text>
      <text x="410" y="92" font-family="system-ui" font-size="12" fill="#333">12</text>
      <text x="450" y="92" font-family="system-ui" font-size="11" fill="#00a32a" font-weight="600">Videos</text>

      <!-- Row 2 -->
      <rect x="0" y="105" width="570" height="35" fill="#fff" stroke="#dcdcde" stroke-width="0.5"/>
      <rect x="10" y="111" width="28" height="22" rx="3" fill="#ddd"/>
      <text x="50" y="127" font-family="system-ui" font-size="12" font-weight="600" fill="#1d2327">Sports Show</text>
      <rect x="240" y="111" width="140" height="22" rx="3" fill="#fff" stroke="#c3c4c7" stroke-width="1"/>
      <text x="250" y="127" font-family="system-ui" font-size="10" fill="#333">Sports</text>
      <text x="410" y="127" font-family="system-ui" font-size="12" fill="#333">8</text>
      <text x="450" y="127" font-family="system-ui" font-size="11" fill="#00a32a" font-weight="600">Videos</text>

      <!-- Row 3 -->
      <rect x="0" y="140" width="570" height="35" fill="#f9f9f9" stroke="#dcdcde" stroke-width="0.5"/>
      <rect x="10" y="146" width="28" height="22" rx="3" fill="#ddd"/>
      <text x="50" y="162" font-family="system-ui" font-size="12" font-weight="600" fill="#1d2327" opacity="0.5">Unlinked Playlist</text>
      <rect x="240" y="146" width="140" height="22" rx="3" fill="#fff" stroke="#c3c4c7" stroke-width="1"/>
      <text x="250" y="162" font-family="system-ui" font-size="10" fill="#999">-- None --</text>
      <text x="410" y="162" font-family="system-ui" font-size="12" fill="#999">12</text>
      <text x="450" y="162" font-family="system-ui" font-size="11" fill="#d63638" font-weight="600">Posts</text>
    </g>

    <!-- Bulk actions -->
    <g transform="translate(0, 300)">
      <rect x="0" y="0" width="570" height="40" rx="6" fill="#f0f6fc" stroke="#c3d4e0" stroke-width="1"/>
      <text x="15" y="25" font-family="system-ui" font-size="12" font-weight="600" fill="#1d2327">Bulk Actions:</text>
      <rect x="130" y="8" width="100" height="24" rx="4" fill="#fff" stroke="#c3c4c7" stroke-width="1"/>
      <text x="140" y="25" font-family="system-ui" font-size="11" fill="#333">Set all limits</text>
      <rect x="245" y="8" width="90" height="24" rx="4" fill="#e8f5e9" stroke="#a5d6a7" stroke-width="1"/>
      <text x="255" y="25" font-family="system-ui" font-size="11" fill="#00a32a">Enable All</text>
      <rect x="345" y="8" width="90" height="24" rx="4" fill="#fce4ec" stroke="#ef9a9a" stroke-width="1"/>
      <text x="355" y="25" font-family="system-ui" font-size="11" fill="#d63638">Disable All</text>
    </g>

    <!-- Save button -->
    <rect x="0" y="355" width="180" height="40" rx="4" fill="#2271b1"/>
    <text x="90" y="380" font-family="system-ui" font-size="15" font-weight="600" fill="#fff" text-anchor="middle">Save Category Links</text>
  </g>
</svg>
