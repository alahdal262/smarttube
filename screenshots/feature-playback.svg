<svg xmlns="http://www.w3.org/2000/svg" width="800" height="420" viewBox="0 0 800 420">
  <defs>
    <linearGradient id="dbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <filter id="shd">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>
  <rect width="800" height="420" fill="url(#dbg)" rx="12"/>

  <!-- Desktop: Lightbox -->
  <g transform="translate(30, 25)">
    <text x="170" y="20" font-family="system-ui, sans-serif" font-size="17" font-weight="700" fill="#f5a623" text-anchor="middle">Desktop — Lightbox</text>
    <!-- Browser frame -->
    <rect x="10" y="35" width="320" height="220" rx="8" fill="#2a2a3e" stroke="#444" stroke-width="1.5"/>
    <circle cx="28" cy="48" r="5" fill="#ff5f57"/>
    <circle cx="44" cy="48" r="5" fill="#febc2e"/>
    <circle cx="60" cy="48" r="5" fill="#28c840"/>
    <rect x="80" y="42" width="200" height="14" rx="7" fill="rgba(255,255,255,0.08)"/>
    <text x="180" y="53" font-family="monospace" font-size="8" fill="rgba(255,255,255,0.3)" text-anchor="middle">yementv.tv/category/news</text>
    <rect x="10" y="58" width="320" height="197" fill="#111"/>
    <!-- Dark overlay -->
    <rect x="10" y="58" width="320" height="197" fill="rgba(0,0,0,0.88)"/>
    <!-- Video frame centered -->
    <rect x="45" y="78" width="250" height="141" rx="8" fill="#000" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
    <!-- Fake YouTube player -->
    <rect x="46" y="79" width="248" height="120" fill="#1a1a1a" rx="7"/>
    <!-- Play button -->
    <path d="M148 118 L148 158 L183 138 Z" fill="#ff0000" opacity="0.9"/>
    <!-- YouTube controls bar -->
    <rect x="46" y="199" width="248" height="18" fill="#222" rx="0 0 7 7"/>
    <rect x="56" y="206" width="100" height="4" rx="2" fill="#444"/>
    <rect x="56" y="206" width="35" height="4" rx="2" fill="#ff0000"/>
    <circle cx="91" cy="208" r="5" fill="#ff0000"/>
    <!-- Close X -->
    <circle cx="298" cy="72" r="14" fill="rgba(255,255,255,0.1)"/>
    <text x="298" y="78" font-family="system-ui" font-size="18" fill="#fff" text-anchor="middle" opacity="0.8">&times;</text>
    <text x="170" y="245" font-family="system-ui" font-size="10" fill="rgba(255,255,255,0.3)" text-anchor="middle">Click outside or press ESC to close</text>
  </g>

  <!-- Mobile: Clean PiP -->
  <g transform="translate(420, 25)">
    <text x="170" y="20" font-family="system-ui, sans-serif" font-size="17" font-weight="700" fill="#f5a623" text-anchor="middle">Mobile — Clean PiP</text>
    <!-- Phone frame -->
    <rect x="95" y="35" width="155" height="310" rx="22" fill="#0a0a0a" stroke="#444" stroke-width="2"/>
    <rect x="101" y="55" width="143" height="270" rx="4" fill="#14706e"/>
    <!-- Notch -->
    <rect x="143" y="38" width="55" height="7" rx="3.5" fill="#222"/>

    <!-- Content behind (blurred category page) -->
    <rect x="105" y="62" width="130" height="18" rx="3" fill="rgba(255,255,255,0.08)"/>
    <rect x="105" y="85" width="62" height="45" rx="3" fill="rgba(255,255,255,0.06)"/>
    <rect x="172" y="85" width="62" height="45" rx="3" fill="rgba(255,255,255,0.06)"/>
    <rect x="105" y="135" width="62" height="45" rx="3" fill="rgba(255,255,255,0.06)"/>
    <rect x="172" y="135" width="62" height="45" rx="3" fill="rgba(255,255,255,0.06)"/>
    <rect x="105" y="185" width="62" height="45" rx="3" fill="rgba(255,255,255,0.06)"/>
    <rect x="172" y="185" width="62" height="45" rx="3" fill="rgba(255,255,255,0.06)"/>

    <!-- PiP: just video, no background -->
    <g filter="url(#shd)">
      <rect x="115" y="245" width="120" height="68" rx="8" fill="#000"/>
      <!-- Fake YouTube embed -->
      <rect x="116" y="246" width="118" height="50" fill="#1a1a1a" rx="7"/>
      <path d="M162 260 L162 280 L178 270 Z" fill="#ff0000" opacity="0.85"/>
      <!-- YouTube controls -->
      <rect x="116" y="296" width="118" height="16" fill="#111" rx="0 0 7 7"/>
      <rect x="124" y="302" width="60" height="3" rx="1.5" fill="#444"/>
      <rect x="124" y="302" width="20" height="3" rx="1.5" fill="#ff0000"/>
      <!-- Clean close button — small circle -->
      <circle cx="229" cy="251" r="10" fill="rgba(0,0,0,0.5)"/>
      <text x="229" y="255" font-family="system-ui" font-size="12" fill="#fff" text-anchor="middle">&times;</text>
    </g>

    <!-- Arrow showing it floats -->
    <text x="250" y="275" font-family="system-ui" font-size="10" fill="rgba(255,255,255,0.35)">floating</text>
    <text x="250" y="288" font-family="system-ui" font-size="10" fill="rgba(255,255,255,0.35)">draggable</text>
  </g>

  <!-- Bottom label -->
  <g transform="translate(0, 385)">
    <rect x="50" y="0" width="700" height="26" rx="13" fill="rgba(245,166,35,0.1)"/>
    <text x="400" y="18" font-family="system-ui, sans-serif" font-size="13" fill="#f5a623" text-anchor="middle">
      Auto-detected by device — no configuration needed
    </text>
  </g>
</svg>
