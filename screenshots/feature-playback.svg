<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="dbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#dbg)" rx="12"/>

  <!-- Desktop: Lightbox mockup -->
  <g transform="translate(40, 30)">
    <text x="160" y="20" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#f5a623" text-anchor="middle">Desktop — Lightbox</text>
    <!-- Browser frame -->
    <rect x="10" y="35" width="300" height="200" rx="8" fill="#2a2a3e" stroke="#444" stroke-width="1.5"/>
    <circle cx="28" cy="48" r="5" fill="#ff5f57"/>
    <circle cx="44" cy="48" r="5" fill="#febc2e"/>
    <circle cx="60" cy="48" r="5" fill="#28c840"/>
    <rect x="10" y="58" width="300" height="177" fill="#111"/>
    <!-- Dark overlay -->
    <rect x="10" y="58" width="300" height="177" fill="rgba(0,0,0,0.85)" rx="0"/>
    <!-- Video frame centered -->
    <rect x="50" y="78" width="220" height="124" rx="6" fill="#000" stroke="#333" stroke-width="1"/>
    <!-- Play triangle -->
    <path d="M140 120 L140 160 L175 140 Z" fill="#ff0000"/>
    <!-- Close X -->
    <text x="280" y="85" font-family="system-ui" font-size="22" fill="#fff" opacity="0.7">&times;</text>
    <text x="160" y="225" font-family="system-ui" font-size="11" fill="rgba(255,255,255,0.4)" text-anchor="middle">Click anywhere to close</text>
  </g>

  <!-- Mobile: PiP mockup -->
  <g transform="translate(420, 30)">
    <text x="170" y="20" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#f5a623" text-anchor="middle">Mobile — PiP Player</text>
    <!-- Phone frame -->
    <rect x="90" y="35" width="160" height="300" rx="20" fill="#1a1a2e" stroke="#555" stroke-width="2"/>
    <rect x="96" y="55" width="148" height="260" rx="4" fill="#14706e"/>
    <!-- Notch -->
    <rect x="140" y="38" width="60" height="8" rx="4" fill="#333"/>

    <!-- Content behind (category page) -->
    <rect x="100" y="62" width="136" height="20" rx="3" fill="rgba(255,255,255,0.1)"/>
    <rect x="100" y="88" width="64" height="50" rx="3" fill="rgba(255,255,255,0.08)"/>
    <rect x="170" y="88" width="64" height="50" rx="3" fill="rgba(255,255,255,0.08)"/>
    <rect x="100" y="144" width="64" height="50" rx="3" fill="rgba(255,255,255,0.08)"/>
    <rect x="170" y="144" width="64" height="50" rx="3" fill="rgba(255,255,255,0.08)"/>

    <!-- PiP window floating -->
    <g filter="url(#shadow)">
      <rect x="115" y="210" width="120" height="90" rx="8" fill="#000" stroke="rgba(245,166,35,0.5)" stroke-width="1.5"/>
      <!-- PiP header bar -->
      <rect x="115" y="210" width="120" height="18" rx="8" fill="#1a1a2e"/>
      <text x="125" y="223" font-family="system-ui" font-size="10" fill="rgba(255,255,255,0.5)">&#9776;</text>
      <text x="228" y="224" font-family="system-ui" font-size="14" fill="#fff">&times;</text>
      <!-- Video area -->
      <rect x="115" y="228" width="120" height="72" fill="#111" rx="0 0 8 8"/>
      <path d="M162 252 L162 276 L182 264 Z" fill="#ff0000"/>
    </g>

    <!-- Drag arrow -->
    <text x="245" y="260" font-family="system-ui" font-size="20" fill="#f5a623">&#8646;</text>
    <text x="260" y="278" font-family="system-ui" font-size="9" fill="rgba(255,255,255,0.4)">drag</text>
  </g>

  <!-- Labels -->
  <g transform="translate(0, 365)">
    <rect x="40" y="0" width="720" height="28" rx="4" fill="rgba(245,166,35,0.1)"/>
    <text x="400" y="19" font-family="system-ui, sans-serif" font-size="13" fill="#f5a623" text-anchor="middle">
      Lightbox on desktop + draggable PiP on mobile — auto-detected by device
    </text>
  </g>
</svg>
